; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:4d_systems_esp32s3_gen4_r8n16]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
upload_port = COM9
monitor_speed = 9600
monitor_port = COM10
; board_build.psram = enabled

; 添加 AUTOSAR 架构的头文件目录
build_flags =
    -Isrc

    ; -Isrc/App/ApiProcessor
    ; -Isrc/App/Entry
    ; -Isrc/App/SerialInput
    ; -Isrc/App/SystemMonitor
    ; -Isrc/App/WifiManager

    -Isrc/Service/DeepSeekApi
    -Isrc/Service/Protocol/CAN
    -Isrc/Service/Protocol/DeepSeek
    -Isrc/Service/Protocol/NetworkService
    -Isrc/Service/SensorState
    -Isrc/Service/CanNetworkService
    -Isrc/Service/Utils
    -Isrc/Service/LedService
    -Isrc/Service/VoiceAssistant
    -Isrc/Service/BaiduApi

    -Isrc/ECUAL

    -Isrc/MCAL/NetworkAbstraction

    -Isrc/BSP/Os_Service

    -Isrc/Config

lib_deps = 
    bblanchon/ArduinoJson@^6.21.3
    https://github.com/tzapu/WiFiManager.git
    fastled/FastLED @ ^3.6.0

; 【核心魔法】监视器过滤器
monitor_filters = 
    time           ; 每行 Log 自动加上时间戳 (超好用)
    send_on_enter  ; 敲完回车才把一整行字符串发出去 (解决无法输入长指令的问题)
    ; hexlify      ; 如果你想看十六进制数据，把这行取消注释

monitor_echo = yes
